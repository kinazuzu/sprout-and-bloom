<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golden Pothos | Sprout and Bloom</title>
  <link rel="stylesheet" href="goldenpathos.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Georgia:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <header class="site-header">
    <div class="brand">
      <img src="pic/LOGO.png" alt="Sprout and Bloom Logo" class="logo">
      <div class="brand-text">
        <h1>Sprout and Bloom</h1>
        <p>Little Sprouts, Big Ideas</p>
      </div>
    </div>

    <nav class="nav-bar">
      <a href="index.html">Home</a>
      <a href="catalog.html" class="active">Catalog</a>
      <a href="contact.html">Contact</a>
      <a href="about.html">About Us</a>
    </nav>
  </header>

  <main class="page">
    <section class="product-wrapper">
      <div class="product-image-panel">
        <img src="pic/golden pathos plant.png" alt="Golden Pathos">
      </div>

      <div class="product-info-panel">
        <span class="badge">Easy Care</span>
        <h2>Golden Pothos</h2>

        <div class="rating">
          <span class="stars">★★★★★</span>
          <span class="rating-count">(324)</span>
        </div>

        <div class="price-row">
          <span class="price">₱420</span>
          <span class="old-price">₱560</span>
        </div>

        <p class="short-desc">
          A beautiful indoor plant with golden-green leaves, perfect for beginners and low-maintenance spaces.
        </p>

        <div class="info-boxes">
          <div class="info-box">
            <span class="label">Category</span>
            <span class="value">Indoor Plant</span>
          </div>
          <div class="info-box">
            <span class="label">Difficulty</span>
            <span class="value">Easy</span>
          </div>
          <div class="info-box">
            <span class="label">Watering</span>
            <span class="value">Weekly</span>
          </div>


        <div class="button-group">
          <a href="../catalog.html" class="back-btn">Back to Catalog</a>
      </div>
    </section>
  </main>

</body>
</html>
